<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance Tracker">
    <title>Personal Finance Tracker 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .header p {
            opacity: 0.95;
            font-size: 14px;
            font-weight: 500;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        
        .summary-card.income {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
        }
        
        .summary-card.expenses {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
        }
        
        .summary-card.net {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
        }
        
        .summary-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .summary-value {
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }
        
        .summary-subtitle {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 8px;
            font-weight: 500;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.8);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: -0.3px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            color: #718096;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-btn:hover {
            color: #667eea;
        }
        
        .add-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .entry-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: linear-gradient(135deg, #f8f9fa 0%, #edf2f7 100%);
            border-radius: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.2s;
        }
        
        .entry-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transform: translateX(4px);
        }
        
        .entry-info {
            flex: 1;
        }
        
        .entry-name {
            font-weight: 600;
            font-size: 14px;
            color: #2d3748;
        }
        
        .entry-date {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
            font-weight: 500;
        }
        
        .entry-amount {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-right: 12px;
            font-variant-numeric: tabular-nums;
        }
        
        .entry-amount.income {
            color: #48bb78;
        }
        
        .entry-amount.expense {
            color: #f56565;
        }
        
        .delete-btn {
            padding: 6px 12px;
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #f56565;
            transform: scale(1.05);
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            margin-top: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .form-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-btn.submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .form-btn.submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .form-btn.cancel {
            background: #e2e8f0;
            color: #2d3748;
        }
        
        .form-btn.cancel:hover {
            background: #cbd5e0;
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .nav-tab {
            padding: 10px 18px;
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .nav-tab:hover {
            transform: translateY(-2px);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }
            
            .summary-cards {
                grid-template-columns: 1fr;
            }
            
            .tab-buttons {
                flex-wrap: wrap;
            }
            
            .tab-btn {
                font-size: 13px;
                padding: 8px 16px;
            }
            
            .modal-content {
                width: 95%;
                padding: 24px;
            }
            
            .chart-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Financial Tracker 2026</h1>
        <p>Track income and expenses with intelligent insights</p>
    </div>

    <div class="container">
        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card income">
                <div class="summary-label">Total Income</div>
                <div class="summary-value" id="totalIncome">$0</div>
                <div class="summary-subtitle" id="incomeCount">0 entries</div>
            </div>
            <div class="summary-card expenses">
                <div class="summary-label">Total Expenses</div>
                <div class="summary-value" id="totalExpenses">$0</div>
                <div class="summary-subtitle" id="expenseCount">0 entries</div>
            </div>
            <div class="summary-card net">
                <div class="summary-label">Net Savings</div>
                <div class="summary-value" id="netBalance">$0</div>
                <div class="summary-subtitle">All Time</div>
            </div>
        </div>

        <!-- Overview Charts -->
        <div class="card">
            <div class="card-title">
                Overview
                <button class="add-btn" onclick="showAddModal()">+ Add Entry</button>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchOverviewTab('monthly')">Monthly</button>
                <button class="tab-btn" onclick="switchOverviewTab('yearly')">Yearly Cumulative</button>
                <button class="tab-btn" onclick="switchOverviewTab('average')">Avg per Month</button>
            </div>

            <div id="monthlyChart" class="tab-content active">
                <div class="chart-container">
                    <canvas id="overviewChart"></canvas>
                </div>
            </div>

            <div id="yearlyChart" class="tab-content">
                <div class="chart-container">
                    <canvas id="cumulativeChart"></canvas>
                </div>
            </div>

            <div id="averageChart" class="tab-content">
                <div class="chart-container">
                    <canvas id="averageMonthChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Income Entries -->
        <div class="card">
            <div class="card-title">
                Income Entries
                <button class="add-btn" onclick="showAddModal('income')">+ Add Income</button>
            </div>
            <div id="incomeList" class="entry-list"></div>
        </div>

        <!-- Expense Entries -->
        <div class="card">
            <div class="card-title">
                Expense Entries
                <button class="add-btn" onclick="showAddModal('expense')">+ Add Expense</button>
            </div>
            <div id="expenseList" class="entry-list"></div>
        </div>

        <!-- Expense Breakdown -->
        <div class="card">
            <div class="card-title">Expense Breakdown</div>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <!-- Trend Chart -->
        <div class="card">
            <div class="card-title">Trends Over Time</div>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Add Entry Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add New Entry</div>
            <form onsubmit="handleAddEntry(event)">
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select id="entryType" class="form-input" onchange="updateTypeFields()">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" id="categoryLabel">Source</label>
                    <input type="text" id="category" class="form-input" placeholder="e.g., Salary, Freelance" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" id="amount" class="form-input" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Date</label>
                    <input type="date" id="date" class="form-input" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn submit">Add Entry</button>
                    <button type="button" class="form-btn cancel" onclick="closeAddModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let data = {
            income: [],
            expenses: []
        };
        
        let charts = {};

        // Initialize with date
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            document.getElementById('date').valueAsDate = today;
            loadData();
            render();
        });

        function loadData() {
            const stored = localStorage.getItem('financeData');
            if (stored) {
                data = JSON.parse(stored);
            }
        }

        function saveData() {
            localStorage.setItem('financeData', JSON.stringify(data));
            render();
        }

        function render() {
            updateSummary();
            renderIncomeList();
            renderExpenseList();
            renderOverviewChart();
            renderExpenseChart();
            renderTrendChart();
        }

        function updateSummary() {
            const totalIncome = data.income.reduce((sum, item) => sum + item.amount, 0);
            const totalExpenses = data.expenses.reduce((sum, item) => sum + item.amount, 0);
            const net = totalIncome - totalExpenses;

            document.getElementById('totalIncome').textContent = '$' + totalIncome.toLocaleString('en-US', { maximumFractionDigits: 0 });
            document.getElementById('totalExpenses').textContent = '$' + totalExpenses.toLocaleString('en-US', { maximumFractionDigits: 0 });
            document.getElementById('netBalance').textContent = (net >= 0 ? '+' : '') + '$' + net.toLocaleString('en-US', { maximumFractionDigits: 0 });
            document.getElementById('incomeCount').textContent = data.income.length + ' entries';
            document.getElementById('expenseCount').textContent = data.expenses.length + ' entries';
        }

        function renderIncomeList() {
            const list = document.getElementById('incomeList');
            if (data.income.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No income entries yet</div></div>';
                return;
            }
            list.innerHTML = data.income
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .map((item, idx) => `
                    <div class="entry-item">
                        <div class="entry-info">
                            <div class="entry-name">${item.source}</div>
                            <div class="entry-date">${new Date(item.date).toLocaleDateString()}</div>
                        </div>
                        <div class="entry-amount income">+$${item.amount.toLocaleString()}</div>
                        <button class="delete-btn" onclick="deleteIncome(${idx})">Delete</button>
                    </div>
                `).join('');
        }

        function renderExpenseList() {
            const list = document.getElementById('expenseList');
            if (data.expenses.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No expense entries yet</div></div>';
                return;
            }
            list.innerHTML = data.expenses
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .map((item, idx) => `
                    <div class="entry-item">
                        <div class="entry-info">
                            <div class="entry-name">${item.category}</div>
                            <div class="entry-date">${new Date(item.date).toLocaleDateString()}</div>
                        </div>
                        <div class="entry-amount expense">-$${item.amount.toLocaleString()}</div>
                        <button class="delete-btn" onclick="deleteExpense(${idx})">Delete</button>
                    </div>
                `).join('');
        }

        function deleteIncome(idx) {
            if (confirm('Delete this income entry?')) {
                data.income.splice(idx, 1);
                saveData();
            }
        }

        function deleteExpense(idx) {
            if (confirm('Delete this expense entry?')) {
                data.expenses.splice(idx, 1);
                saveData();
            }
        }

        function showAddModal(type = null) {
            if (type) {
                document.getElementById('entryType').value = type;
                updateTypeFields();
            }
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function updateTypeFields() {
            const type = document.getElementById('entryType').value;
            const label = document.getElementById('categoryLabel');
            label.textContent = type === 'income' ? 'Source' : 'Category';
        }

        function handleAddEntry(event) {
            event.preventDefault();
            const type = document.getElementById('entryType').value;
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;

            if (type === 'income') {
                data.income.push({ source: category, amount, date });
            } else {
                data.expenses.push({ category, amount, date });
            }

            saveData();
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('category').value = '';
            document.getElementById('amount').value = '';
        }

        function switchOverviewTab(tab) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update content
            document.getElementById('monthlyChart').classList.remove('active');
            document.getElementById('yearlyChart').classList.remove('active');
            document.getElementById('averageChart').classList.remove('active');

            if (tab === 'monthly') {
                document.getElementById('monthlyChart').classList.add('active');
                renderMonthlyChart();
            } else if (tab === 'yearly') {
                document.getElementById('yearlyChart').classList.add('active');
                renderCumulativeChart();
            } else if (tab === 'average') {
                document.getElementById('averageChart').classList.add('active');
                renderAverageChart();
            }
        }

        function renderOverviewChart() {
            renderMonthlyChart();
        }

        function renderMonthlyChart() {
            const ctx = document.getElementById('overviewChart');
            if (!ctx) return;

            // Get all unique months
            const allDates = [...data.income.map(i => i.date), ...data.expenses.map(e => e.date)];
            if (allDates.length === 0) {
                if (charts.overview) charts.overview.destroy();
                return;
            }

            const uniqueMonths = [...new Set(allDates.map(d => d.substring(0, 7)))].sort();
            
            const incomeSources = [...new Set(data.income.map(item => item.source))];
            const expenseCategories = [...new Set(data.expenses.map(item => item.category))];
            
            const incomeColors = ['#48bb78', '#38a169', '#2f855a', '#276749', '#22543d'];
            const expenseColors = ['#f56565', '#fc8181', '#f687b3', '#ed64a6', '#d53f8c'];
            
            const datasets = [];
            
            incomeSources.forEach((source, idx) => {
                const monthlyData = uniqueMonths.map(month => {
                    return data.income
                        .filter(item => item.date.startsWith(month) && item.source === source)
                        .reduce((sum, item) => sum + item.amount, 0);
                });
                
                datasets.push({
                    label: source + ' (Income)',
                    data: monthlyData,
                    backgroundColor: incomeColors[idx % incomeColors.length],
                    borderColor: incomeColors[idx % incomeColors.length],
                    borderWidth: 2
                });
            });
            
            expenseCategories.forEach((category, idx) => {
                const monthlyData = uniqueMonths.map(month => {
                    return data.expenses
                        .filter(item => item.date.startsWith(month) && item.category === category)
                        .reduce((sum, item) => sum + item.amount, 0);
                });
                
                datasets.push({
                    label: category + ' (Expense)',
                    data: monthlyData,
                    backgroundColor: expenseColors[idx % expenseColors.length],
                    borderColor: expenseColors[idx % expenseColors.length],
                    borderWidth: 2
                });
            });

            if (charts.overview) {
                charts.overview.destroy();
            }

            charts.overview = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: uniqueMonths.map(m => {
                        const [year, month] = m.split('-');
                        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        return monthNames[parseInt(month) - 1] + ' ' + year;
                    }),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderCumulativeChart() {
            const ctx = document.getElementById('cumulativeChart');
            if (!ctx) return;

            const incomeSources = [...new Set(data.income.map(item => item.source))];
            const expenseCategories = [...new Set(data.expenses.map(item => item.category))];
            
            const incomeColors = ['#48bb78', '#38a169', '#2f855a', '#276749', '#22543d'];
            const expenseColors = ['#f56565', '#fc8181', '#f687b3', '#ed64a6', '#d53f8c'];
            
            const labels = [...incomeSources, ...expenseCategories];
            const backgroundColors = [
                ...incomeSources.map((_, idx) => incomeColors[idx % incomeColors.length]),
                ...expenseCategories.map((_, idx) => expenseColors[idx % expenseColors.length])
            ];
            
            const amounts = [
                ...incomeSources.map(source => 
                    data.income.filter(i => i.source === source).reduce((sum, i) => sum + i.amount, 0)
                ),
                ...expenseCategories.map(category =>
                    data.expenses.filter(e => e.category === category).reduce((sum, e) => sum + e.amount, 0)
                )
            ];

            if (charts.cumulative) {
                charts.cumulative.destroy();
            }

            charts.cumulative = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Amount',
                        data: amounts,
                        backgroundColor: backgroundColors,
                        borderColor: backgroundColors,
                        borderWidth: 2
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderAverageChart() {
            const ctx = document.getElementById('averageMonthChart');
            if (!ctx) return;

            // Calculate months passed (current month inclusive)
            const today = new Date();
            const currentMonth = today.getMonth() + 1; // 1-12, January = 1
            const monthsPassed = currentMonth;

            const incomeSources = [...new Set(data.income.map(item => item.source))];
            const expenseCategories = [...new Set(data.expenses.map(item => item.category))];
            
            const incomeColors = ['#48bb78', '#38a169', '#2f855a', '#276749', '#22543d'];
            const expenseColors = ['#f56565', '#fc8181', '#f687b3', '#ed64a6', '#d53f8c'];
            
            const labels = [...incomeSources, ...expenseCategories];
            const backgroundColors = [
                ...incomeSources.map((_, idx) => incomeColors[idx % incomeColors.length]),
                ...expenseCategories.map((_, idx) => expenseColors[idx % expenseColors.length])
            ];
            
            const amounts = [
                ...incomeSources.map(source => 
                    data.income.filter(i => i.source === source).reduce((sum, i) => sum + i.amount, 0) / monthsPassed
                ),
                ...expenseCategories.map(category =>
                    data.expenses.filter(e => e.category === category).reduce((sum, e) => sum + e.amount, 0) / monthsPassed
                )
            ];

            if (charts.average) {
                charts.average.destroy();
            }

            charts.average = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Avg per Month (${monthsPassed} months)`,
                        data: amounts,
                        backgroundColor: backgroundColors,
                        borderColor: backgroundColors,
                        borderWidth: 2
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom'
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderExpenseChart() {
            const ctx = document.getElementById('expenseChart');
            
            const categoryTotals = {};
            data.expenses.forEach(exp => {
                categoryTotals[exp.category] = (categoryTotals[exp.category] || 0) + exp.amount;
            });

            if (charts.expense) {
                charts.expense.destroy();
            }
            
            const categories = Object.keys(categoryTotals);
            const expenseColors = [
                '#f56565', '#fc8181', '#f687b3', '#ed64a6', '#d53f8c',
                '#805ad5', '#9f7aea', '#b794f4', '#d6bcfa', '#e9d8fd',
                '#667eea', '#764ba2', '#f093fb', '#4facfe'
            ];

            charts.expense = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories,
                    datasets: [{
                        data: Object.values(categoryTotals),
                        backgroundColor: categories.map((_, idx) => expenseColors[idx % expenseColors.length])
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart');
            
            const allDates = [...data.income.map(i => i.date), ...data.expenses.map(e => e.date)];
            const uniqueMonths = [...new Set(allDates.map(d => d.substring(0, 7)))].sort();
            
            if (uniqueMonths.length === 0) {
                if (charts.trend) charts.trend.destroy();
                return;
            }
            
            const incomeSources = [...new Set(data.income.map(item => item.source))];
            const expenseCategories = [...new Set(data.expenses.map(item => item.category))];
            
            const incomeColors = ['#48bb78', '#38a169', '#2f855a', '#276749', '#22543d'];
            const expenseColors = ['#f56565', '#fc8181', '#f687b3', '#ed64a6', '#d53f8c'];
            
            const datasets = [];
            
            incomeSources.forEach((source, idx) => {
                const monthlyData = uniqueMonths.map(month => {
                    return data.income
                        .filter(item => item.date.startsWith(month) && item.source === source)
                        .reduce((sum, item) => sum + item.amount, 0);
                });
                
                datasets.push({
                    label: source,
                    data: monthlyData,
                    borderColor: incomeColors[idx % incomeColors.length],
                    backgroundColor: incomeColors[idx % incomeColors.length] + '20',
                    tension: 0.4,
                    fill: false,
                    borderWidth: 2
                });
            });
            
            expenseCategories.forEach((category, idx) => {
                const monthlyData = uniqueMonths.map(month => {
                    return data.expenses
                        .filter(item => item.date.startsWith(month) && item.category === category)
                        .reduce((sum, item) => sum + item.amount, 0);
                });
                
                datasets.push({
                    label: category,
                    data: monthlyData,
                    borderColor: expenseColors[idx % expenseColors.length],
                    backgroundColor: expenseColors[idx % expenseColors.length] + '20',
                    tension: 0.4,
                    fill: false,
                    borderWidth: 2,
                    borderDash: [5, 5]
                });
            });

            if (charts.trend) {
                charts.trend.destroy();
            }

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: uniqueMonths.map(m => {
                        const [year, month] = m.split('-');
                        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        return monthNames[parseInt(month) - 1] + ' ' + year;
                    }),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', (e) => {
            if (e.target.id === 'addModal') {
                closeAddModal();
            }
        });
    </script>
</body>
</html>
